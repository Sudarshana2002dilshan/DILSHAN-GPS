<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DILSHAN_GPS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-title">DILSHAN_GPS</header>
    <div class="wind-bar">Wind: <span id="windSpeed">--</span> km/h | Dir: <span id="windDir">--</span>°</div>

    <div class="tabs">
        <button onclick="showTab('main')">LIVE</button>
        <button onclick="showTab('stats')">STATS</button>
    </div>

    <div id="main" class="tab-content">
        <div class="card"><div class="label">SPEED (km/h)</div><div class="value" id="speed">0.0</div></div>
        <div class="card"><div class="label">COURSE</div><div class="value" id="course">--- °</div></div>
        <div class="card location-card">
            <div class="value-loc" id="lat">---</div>
            <div class="value-loc" id="lon">---</div>
        </div>
        <button class="save-btn" onclick="saveWaypoint()">SAVE WAYPOINT</button>
    </div>

    <div id="stats" class="tab-content" style="display:none">
        <div class="card"><div class="label">MAX SPEED</div><div class="value" id="maxSpeed">0.0</div></div>
        <div class="card"><div class="label">AVG SPEED</div><div class="value" id="avgSpeed">0.0</div></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
