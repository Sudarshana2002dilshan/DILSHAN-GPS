<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DILSHAN MARINE GPS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hazard-alert" class="whitebar" style="display:none;"></div>

    <div id="home" class="tab-pane active">
        <div class="logo-container"><img src="DILGPS.png" class="main-logo"></div>
        <div class="card animate-card">
            <div class="label">LOCATION (DMS)</div>
            <div class="huge-text" id="lat">--</div>
            <div class="huge-text" id="lon">--</div>
            <div class="time-text" id="time">--:--:--</div>
        </div>
        <div class="card animate-card">
            <div class="label">SPEED (SOG)</div>
            <div class="speed-text" id="speed">0.0 km/h</div>
        </div>
        <div class="card animate-card">
            <div class="label">WIND INFO</div>
            <div class="wind-text" id="wind-info">--</div>
        </div>
    </div>

    <div id="windy" class="tab-pane"><iframe src="https://embed.windy.com/embed2.html?lat=7.0&lon=80.0&zoom=7"></iframe></div>
    <div id="mark" class="tab-pane">
        <div class="card">
            <h3>📍 මාක් කරන්න</h3>
            <input type="text" id="h-name" placeholder="ගලේ නම..." class="input-field">
            <button class="btn" onclick="saveHazard()">💾 සේව් කරන්න</button>
        </div>
    </div>
    <div id="settings" class="tab-pane">
        <div class="card">
            <img src="DILGPS.png" class="about-logo">
            <h2>SETTINGS</h2>
            <button class="btn" onclick="toggleTheme()">🌓 DARK / LIGHT MODE</button>
            <a href="https://wa.me/94765529447" class="btn-wa">💬 CONTACT WHATSAPP</a>
<button class="btn" onclick="openAdmin()">⚙️ ADMIN ACCESS</button>
    </div>
</div>

<div id="admin-modal" class="card" style="display:none; border-color: red;">
    <h3>🛠️ ADMIN CONTROL</h3>
    <input type="text" id="h-name" placeholder="ගලේ නම" class="input-field"><br>
    <input type="number" id="h-lat" placeholder="Latitude" class="input-field" step="any"><br>
    <input type="number" id="h-lon" placeholder="Longitude" class="input-field" step="any"><br>
    <button class="btn" onclick="adminSaveHazard()">SAVE TO MAP</button>
</div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button onclick="showTab('home')">🏠</button>
        <button onclick="showTab('windy')">🌪️</button>
        <button onclick="showTab('mark')">📍+</button>
        <button onclick="showTab('settings')">⚙️</button>
    </nav>
    <script type="module" src="script.js"></script>
</body>
</html>
