<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DILSHAN MARINE GPS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>DILSHAN MARINE GPS NAVIGATOR</header>
    
    <div class="tabs">
        <button onclick="showTab('home')">LIVE</button>
        <button onclick="showTab('points')">POINTS</button>
        <button onclick="showTab('settings')">SOS</button>
    </div>

    <div id="home" class="tab-content">
        <div class="card"><div class="label">SPEED</div><div class="value" id="speed">0.0 km/h</div></div>
        <div class="card"><div class="label">HEADING</div><div class="value" id="heading">0°</div></div>
        <div class="card">
            <div class="label">LOCATION</div>
            <div class="val-sm" id="lat">---</div>
            <div class="val-sm" id="lon">---</div>
            <div class="label" style="margin-top:10px">LOCAL TIME</div>
            <div class="val-sm" id="time">--:--:--</div>
        </div>
        <div class="card">
            <div class="label">WIND DATA</div>
            <div class="val-sm" id="wind">වේගය: -- km/h | දිශාව: --</div>
        </div>
    </div>

    <div id="points" class="tab-content" style="display:none">
        <button class="save-btn" onclick="addWaypoint()">+ SAVE CURRENT LOCATION</button>
        <div class="card"><ul id="wp-list"></ul></div>
    </div>

    <div id="settings" class="tab-content" style="display:none">
        <button class="sos-btn" onclick="sendSOS()">SOS EMERGENCY</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
