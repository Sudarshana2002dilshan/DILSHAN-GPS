<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DILSHAN MARINE GPS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ⚠️ අනතුරු ඇඟවීමේ බාර් එක (Hazard Alert) -->
    <div id="hazard-alert" style="display:none; background: #ff1744; color: white; text-align: center; padding: 12px; font-weight: bold; font-size: 20px; position: fixed; top: 0; width: 100%; z-index: 9999;"></div>

    <!-- 🏠 HOME TAB -->
    <div id="home" class="tab-pane active" style="margin-top: 30px; padding-bottom: 100px;">
        <div class="logo-container" style="display: flex; justify-content: center; align-items: center; padding: 15px;">
            <div class="logo-circle" style="width: 100px; height: 100px; border-radius: 50%; border: 3px solid #64ffda; overflow: hidden;">
                <img src="DILGPS.png" class="main-logo" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
        </div>
        <h2 class="app-title" style="text-align: center; color: #64ffda; font-size: 24px; font-weight: bold; margin-bottom: 15px;">DILSHAN MARINE GPS</h2>
        
        <!-- 📍 LOCATION CARD -->
        <div class="card" style="border: 2px solid #64ffda;">
            <div class="label" style="text-align: center; font-size: 16px; color: #64ffda;">📍 LOCATION & TIME</div>
            <div class="huge-text" id="lat" style="font-size: 3.5rem; font-weight: 900; text-align: center; color: #ffffff; margin: 10px 0; font-family: monospace;">--</div>
            <div class="huge-text" id="lon" style="font-size: 3.5rem; font-weight: 900; text-align: center; color: #ffffff; margin: 10px 0; font-family: monospace;">--</div>
            <div class="time-text" id="time" style="text-align: center; font-size: 22px; font-weight: bold; color: #ff9800; margin-top: 5px;">--:--:--</div>
        </div>

        <!-- 🚀 SPEED CARD -->
        <div class="card" style="border: 1px solid #ff5722;">
            <div class="label" style="font-size: 16px; color: #ff5722;">🚀 SPEED (SOG)</div>
            <div class="speed-text" id="speed" style="font-size: 4.5rem; font-weight: 900; text-align: center; color: #ff5722; margin: 10px 0;">0.0 km/h</div>
        </div>

        <!-- 🌬️ WIND INFO & 🌊 CURRENT CARD -->
        <div class="card" style="border: 1px solid #00e676;">
            <div class="label" style="font-size: 16px; color: #00e676;">🌬️ WIND INFO (ලයිව් සුළඟ)</div>
            <div class="huge-text" id="wind-speed" style="text-align: center; font-size: 3.5rem; font-weight: 900; color: #00e676; margin: 5px 0;">-- km/h</div>
            <div class="wind-dir" id="wind-dir" style="text-align: center; font-size: 20px; font-weight: bold; color: #edf2f7; opacity: 0.95;">--</div>
            
            <hr style="border: 0; border-top: 2px solid rgba(100, 255, 218, 0.3); margin: 20px 0;">
            
            <div class="label" style="font-size: 16px; color: #2196f3;">🌊 OCEAN CURRENT (දියකඩ)</div>
            <div class="huge-text" id="current-speed" style="text-align: center; font-size: 3.5rem; font-weight: 900; color: #2196f3; margin: 5px 0;">-- m/s</div>
            <div class="current-dir" id="current-dir" style="text-align: center; font-size: 20px; font-weight: bold; color: #edf2f7; opacity: 0.95;">--</div>
        </div>
    </div>

    <!-- 🌪️ WINDY TAB -->
    <div id="windy" class="tab-pane" style="display:none; height: 100vh; padding-bottom: 80px;">
        <iframe src="https://embed.windy.com/embed2.html?lat=7.0&lon=80.0&zoom=7&level=surface&overlay=currents&menu=&message=&marker=&calendar=&pressure=&type=map&location=coordinates&detail=&metricWind=default&metricTemp=default&radarRange=-1" width="100%" height="100%" frameborder="0"></iframe>
    </div>
    
    <!-- 📍 MARK TAB -->
    <div id="mark" class="tab-pane" style="display:none; padding: 20px; padding-bottom: 80px;">
        <div class="card">
            <h3 style="font-size: 22px; color: #64ffda; text-align: center;">📍 ගලක් මාක් කරන්න</h3>
            <input type="text" id="h-name" placeholder="ගලේ නම ඇතුළත් කරන්න" class="input-field" style="width: 100%; padding: 15px; font-size: 18px; margin: 15px 0; border-radius: 8px; box-sizing: border-box;">
            <button class="btn" onclick="saveHazard()" style="width: 100%; padding: 15px; font-size: 18px; background: #64ffda; color: black; font-weight: bold; border: none; border-radius: 8px;">💾 සේව් කරන්න</button>
        </div>
    </div>

    <!-- ⚙️ SETTINGS TAB -->
    <div id="settings" class="tab-pane" style="display:none; padding: 20px; padding-bottom: 80px;">
        <div class="card">
            <div class="settings-header" style="text-align: center;">
                <img src="DILGPS.png" style="width:100px; height:100px; border-radius:50%; margin:10px auto; display:block; border: 2px solid #64ffda;">
                <h3 style="font-size: 22px;">DILSHAN MARINE GPS</h3>
                <p style="font-size: 16px; font-weight: bold; color: #64ffda;">Developer: Sudarshana DILSHAN</p>
                <p style="font-size: 18px; font-weight: bold;">📞 0765529447</p>
            </div>

            <hr style="border: 0; border-top: 1px solid #64ffda; margin: 20px 0;">

            <div class="settings-actions">
                <button class="btn" onclick="toggleTheme()" style="width: 100%; padding: 12px; font-size: 16px; margin: 5px 0;">🌓 DARK / LIGHT MODE</button>
                <button class="btn" onclick="toggleNightVision()" style="width: 100%; padding: 12px; font-size: 16px; margin: 5px 0; background:#ff1744; color:white;">🌙 NIGHT VISION MODE (🔴)</button>
                <button class="btn" onclick="showBatteryInfo()" style="width: 100%; padding: 12px; font-size: 16px; margin: 5px 0; background:#ff9800; color:black;">🔋 BATTERY INFO</button>
            </div>

            <hr style="border: 0; border-top: 1px solid #64ffda; margin: 20px 0;">

            <!-- 🔄 CONVERTER -->
            <div style="background: rgba(100, 255, 218, 0.05); padding: 15px; border-radius: 15px; border: 1px solid #64ffda;">
                <h4 style="color: #64ffda; margin-top: 0; text-align: center; font-size: 18px;">🔄 GPS COORDINATES CONVERTER</h4>
                <input type="number" id="convert-input" placeholder="7.12345" class="input-field" style="width:100%; padding: 12px; font-size: 16px; margin: 5px 0; border-radius: 8px; box-sizing: border-box;">
                <button class="btn" onclick="convertGPS()" style="width:100%; padding: 12px; font-size: 16px; margin: 10px 0; background: #64ffda; color: black;">🔄 CONVERT</button>
                <div style="font-weight: bold; font-size: 18px; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; color: white; text-align: center;">
                    ප්‍රතිඵලය: <span id="convert-result" style="color: #ff5722; font-weight: 900;">--</span>
                </div>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION BAR -->
    <nav class="bottom-nav" style="position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #0a192f; padding: 15px 0; border-top: 1px solid #64ffda; z-index: 9999;">
        <button onclick="showTab('home')" style="background: none; border: none; font-size: 28px; cursor: pointer;">🏠</button>
        <button onclick="showTab('windy')" style="background: none; border: none; font-size: 28px; cursor: pointer;">🌪️</button>
        <button onclick="showTab('mark')" style="background: none; border: none; font-size: 28px; cursor: pointer;">📍+</button>
        <button onclick="showTab('settings')" style="background: none; border: none; font-size: 28px; cursor: pointer;">⚙️</button>
    </nav>

    <script type="module" src="script.js"></script>
</body>
</html>
