<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DILSHAN MARINE GPS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">

    <div id="home" class="tab-pane active">
        <div class="logo-container"><img src="DILGPS.png" class="main-logo"></div>
        <div class="main-container">
            <div class="card">
                <div class="label">📍 LOCATION</div>
                <div class="huge-text" id="lat">--</div>
                <div class="huge-text" id="lon">--</div>
                <div class="time-text" id="time">--:--:--</div>
            </div>
            <div class="card">
                <div class="label">🚀 SPEED (SOG)</div>
                <div class="huge-text" id="speed">0.0 km/h</div>
            </div>
            <div class="card">
                <div class="label">🌬️ WIND SPEED & DIR</div>
                <div class="huge-text" id="wind-speed">-- km/h</div>
                <div class="huge-text" id="wind-dir" style="font-size:25px;">--</div>
            </div>
        </div>
    </div>

    <div id="windy" class="tab-pane"><iframe src="https://embed.windy.com/embed2.html?lat=7.0&lon=80.0&zoom=7"></iframe></div>

    <div id="settings" class="tab-pane">
        <div class="card">
            <img src="DILGPS.png" class="about-logo">
            <h2>DILSHAN MARINE GPS</h2>
            <p>Version: 2.0.0 Pro</p>
            <p>Developer: Sudarshana Dilshan</p>
            <p>Contact: 076 552 9447</p>
            <button class="btn" onclick="toggleTheme()">🌓 DARK / LIGHT MODE</button>
            <a href="https://wa.me/94765529447" class="btn-wa">💬 CONTACT WHATSAPP</a>
        </div>
    </div>

    <nav class="bottom-nav">
        <button onclick="showTab('home')">🏠 HOME</button>
        <button onclick="showTab('windy')">🌪️ WINDY</button>
        <button onclick="showTab('settings')">⚙️ SETTINGS</button>
    </nav>
    <script src="script.js"></script>
</body>
</html>
