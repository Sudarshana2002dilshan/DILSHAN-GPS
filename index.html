<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DILSHAN MARINE GPS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="hazard-alert" class="whitebar" style="display:none; font-weight: bold; color: #ff1744; text-align: center; padding: 10px;"></div>

    <div id="home" class="tab-pane active">
        <div class="logo-container" style="display: flex; justify-content: center; align-items: center; padding: 20px;">
            <div class="logo-circle" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid #64ffda; overflow: hidden; animation: rotate 10s linear infinite;">
                <img src="DILGPS.png" class="main-logo" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
        </div>
        <h2 class="app-title" style="text-align: center; color: #64ffda; margin-top: -10px; margin-bottom: 20px; font-weight: 900; text-shadow: 1px 1px 3px rgba(0,0,0,0.5);">DILSHAN MARINE GPS</h2>
        
        <div class="card animate-card">
            <div class="label" style="font-weight: bold; color: #ff9800; font-size: 18px;">📍 LOCATION & TIME</div>
            <div class="huge-text" id="lat" style="font-size:35px; font-weight: 900; color: #ffffff;">--</div>
            <div class="huge-text" id="lon" style="font-size:35px; font-weight: 900; color: #ffffff;">--</div>
            <div class="time-text" id="time" style="font-size:28px; font-weight: bold; color:#fbc02d; margin-top:10px;">--:--:--</div>
        </div>

        <div class="card animate-card">
            <div class="label" style="font-weight: bold; color: #ff9800; font-size: 18px;">🚀 SPEED (SOG)</div>
            <div class="speed-text" id="speed" style="font-size:35px; font-weight: 900; color: #ff1744;">0.0 km/h</div>
        </div>

        <div class="card animate-card">
            <div class="label" style="font-weight: bold; color: #ff9800; font-size: 18px;">🌬️ WIND INFO</div>
            <div class="wind-text" id="wind-speed" style="font-size:28px; font-weight: bold; color:#1CFF13; margin-top:10px;">--</div>
            <div class="wind-dir" id="wind-dir" style="font-size:28px; font-weight: bold; color:#1CFF13; margin-top:10px;">--</div>
        </div>
    </div>

    <div id="windy" class="tab-pane">
        <iframe src="https://embed.windy.com/embed2.html?lat=7.0&lon=80.0&zoom=7" width="100%" height="100%" frameborder="0"></iframe>
    </div>
    
    <div id="mark" class="tab-pane">
        <div class="card animate-card">
            <h3 style="color: #64ffda; font-weight: bold;">📍 ගලක් මාක් කරන්න</h3>
            <input type="text" id="h-name" placeholder="ගලේ නම" class="input-field" style="font-weight: bold; color: #333;">
            <button class="btn" onclick="saveHazard()" style="font-weight: bold; color: #ffffff;">💾 සේව් කරන්න</button>
        </div>
    </div>

    <div id="settings" class="tab-pane">
        <div class="card animate-card">
            <div class="settings-header">
                <img src="DILGPS.png" style="width:100px; height:100px; border-radius:50%; margin:10px auto; display:block; border: 2px solid #64ffda;">
                <h3 style="color: #64ffda; font-weight: bold;">DILSHAN MARINE GPS</h3>
                <p style="font-size: 0.9em; opacity: 0.8; font-weight: bold; color: #b0bec5;">Version: 1.0.0</p>
                <p style="font-weight: 900; color: #ffffff;">Developer: Sudarshana DILSHAN</p>
                <p style="font-weight: bold; color: #fbc02d;">📞 0765529447</p>
            </div>

            <hr style="border: 0; border-top: 2px solid #64ffda; margin: 20px 0;">

            <div class="settings-actions">
                <button class="btn" onclick="toggleTheme()" style="font-weight: bold; color: #ffffff;">🌓 DARK / LIGHT MODE</button>
                <button class="btn" onclick="openAdmin()" style="background:#d32f2f; font-weight: bold; color: #ffffff;">🛠️ ADMIN PANEL</button>
                <a href="https://wa.me/94765529447" class="btn" style="background:#25D366; text-decoration:none; display:block; font-weight: bold; color: #ffffff;">💬 WHATSAPP SUPPORT</a>
                <a href="https://drive.google.com/uc?export=download&id=1rCkE_Xmfg0xJFFbBvRW5ETSVuGBFw11l" class="btn" style="background:#1976d2; text-decoration:none; display:block; font-weight: bold; color: #ffffff;">⬇️ DOWNLOAD APP</a>
            </div>

            <div id="admin-modal" class="card" style="display:none; border:2px solid #ff1744; margin-top:20px; background: rgba(255, 23, 68, 0.1);">
                <h4 style="color: #ff1744; font-weight: bold;">🛠️ ADMIN CONTROL</h4>
                <input type="text" id="admin-name" placeholder="ගලේ නම" class="input-field" style="width:90%; font-weight: bold;"><br>
                <input type="number" id="admin-lat" placeholder="Latitude" class="input-field" style="width:90%; font-weight: bold;"><br>
                <input type="number" id="admin-lon" placeholder="Longitude" class="input-field" style="width:90%; font-weight: bold;"><br>
                <button class="btn" onclick="adminSaveHazard()" style="background: #ff1744; font-weight: bold; color: #ffffff; margin-top: 10px;">UPLOAD TO MAP</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button onclick="showTab('home')">🏠</button>
        <button onclick="showTab('windy')">🌪️</button>
        <button onclick="showTab('mark')">📍+</button>
        <button onclick="showTab('settings')">⚙️</button>
    </nav>
    <script type="module" src="script.js"></script>
</body>
</html>
