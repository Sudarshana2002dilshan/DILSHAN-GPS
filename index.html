<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DILSHAN_GPS PRO V2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-title">DILSHAN_GPS PRO</header>
    
    <div id="status" class="status-bar">Connecting to GPS...</div>

    <div class="card">
        <div class="label">SPEED (km/h)</div>
        <div class="value" id="speed">0.0</div>
    </div>

    <div class="card location-card">
        <div class="label">LOCATION (DD°MM.MMM)</div>
        <div class="value-loc" id="lat">---</div>
        <div class="value-loc" id="lon">---</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
