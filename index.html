<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DILSHAN_GPS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-title">DILSHAN_GPS</header>
        
        <div class="card">
            <div class="label">Speed (SOG)</div>
            <div class="value" id="speed">0.0</div>
            <div class="unit">kt</div>
        </div>

        <div class="card">
            <div class="label">Course (COG)</div>
            <div class="value" id="course">---</div>
            <div class="unit">°</div>
        </div>

        <div class="card location-card">
            <div class="label">Location / Time</div>
            <div class="value-loc" id="coords">Loading...</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
